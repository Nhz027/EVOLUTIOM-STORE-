<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Evolutium Craft</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }

body {
    background: #0a0a0c;
    background-image: radial-gradient(circle at 50% 0%, #3d1a00 0%, #0a0a0c 100%);
    color: #fff;
    padding: 20px;
}

h1 { text-align: center; margin-bottom: 30px; }
h1 span { color: orange; }

.menu-abas { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }

.aba {
    padding: 10px 20px;
    background: #16161a;
    border-radius: 8px;
    cursor: pointer;
}

.loja-container {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
}

.banner-img {
    width: 100%;
    border-radius: 8px;
}

.preco { margin: 10px 0; font-size: 20px; }

.btn {
    background: orange;
    border: none;
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
}

/* VIP PAGE */
.vip-page {
    display: none;
    text-align: center;
}

.vip-img {
    width: 220px;
    margin: 10px auto;
}

.kits-vip img {
    width: 170px;
    margin: 10px;
}

/* PIX */
.pix-area {
    display: none;
    background: #000;
    padding: 15px;
    margin-top: 20px;
    border: 2px dashed orange;
}
</style>
</head>

<body>

<h1>EVOLUTIUM <span>CRAFT</span></h1>

<div class="menu-abas">
<div class="aba" onclick="mostrar('kits')">KITS</div>
<div class="aba" onclick="mostrar('vips')">VIPS</div>
</div>

<!-- KITS -->
<div id="kits" class="loja-container" style="display:grid;">

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777948112627-679cbc63-dc9b-449f-9edf-abc0ab5da980.png" class="banner-img">
<div>KIT DBE</div>
<div class="preco">R$ 79,99</div>
<button class="btn" onclick="comprar()">Comprar</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777932013675-f02a1c3f-2dd6-4e65-ae44-e294a0d3531f.png" class="banner-img">
<div>KIT GOD</div>
<div class="preco">R$ 59,99</div>
<button class="btn" onclick="comprar()">Comprar</button>
</div>

</div>

<!-- VIP LISTA -->
<div id="vips" class="loja-container">

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777954537217-c0b6b289-e1b5-4ba1-aad5-e26d39deb871.png" class="banner-img">
<div>VIP ASTRAL</div>
<div class="preco">R$ 59,99</div>
<button class="btn" onclick="abrirVip('astral')">Ver VIP</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777953666424-7d3ea9a0-8973-4020-be51-b8b19e44f1f7.png" class="banner-img">
<div>VIP GOD</div>
<div class="preco">R$ 49,99</div>
<button class="btn" onclick="abrirVip('god')">Ver VIP</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777954269240-656474a4-4914-4b5a-94ef-5e78174ac3c9.png" class="banner-img">
<div>VIP LENDÁRIO</div>
<div class="preco">R$ 79,99</div>
<button class="btn" onclick="abrirVip('lendario')">Ver VIP</button>
</div>

</div>

<!-- VIP PAGE -->
<div id="vipPage" class="vip-page">

<h2 id="vipNome"></h2>
<img id="vipImg" class="vip-img">

<div id="vipInfo"></div>

<div class="kits-vip" id="vipKits"></div>

<div class="preco" id="vipPreco"></div>

<button class="btn" onclick="comprar()">Comprar</button>

</div>

<!-- PIX GLOBAL -->
<div id="pix" class="pix-area">

<div>CHAVE PIX:</div>
<div id="pixKey">efc0f5af-cd44-400c-9426-2d071caa7bec</div>

<button class="btn" onclick="copiar()">Copiar</button>

<p>
1. Copie a chave<br>
2. Faça pagamento<br>
3. Abra Discord<br>
4. Envie comprovante
</p>

</div>

<script>
function mostrar(sec){
kits.style.display="none";
vips.style.display="none";
vipPage.style.display="none";
pix.style.display="none";

document.getElementById(sec).style.display="grid";
}

function abrirVip(tipo){
mostrar("vipPage");

if(tipo=="astral"){
vipNome.innerText="VIP ASTRAL";
vipImg.src="https://www.image2url.com/r2/default/images/1777954537217-c0b6b289-e1b5-4ba1-aad5-e26d39deb871.png";
vipInfo.innerHTML="+ 12 frutas diária (30 dias)<br>+ Tag única";
vipPreco.innerText="R$ 59,99";
}

if(tipo=="god"){
vipNome.innerText="VIP GOD";
vipImg.src="https://www.image2url.com/r2/default/images/1777953666424-7d3ea9a0-8973-4020-be51-b8b19e44f1f7.png";
vipInfo.innerHTML="+ 10 frutas diária (30 dias)<br>+ 100 treino";
vipPreco.innerText="R$ 49,99";
}

if(tipo=="lendario"){
vipNome.innerText="VIP LENDÁRIO";
vipImg.src="https://www.image2url.com/r2/default/images/1777954269240-656474a4-4914-4b5a-94ef-5e78174ac3c9.png";
vipInfo.innerHTML="+ 15 frutas diária (30 dias)<br>+ Ultra Ego";
vipPreco.innerText="R$ 79,99";
}
}

function comprar(){
pix.style.display="block";
}

function copiar(){
navigator.clipboard.writeText("efc0f5af-cd44-400c-9426-2d071caa7bec");
alert("Copiado!");
}
</script>

</body>
</html>
