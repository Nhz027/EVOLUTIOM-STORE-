<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Evolutium Craft - Loja</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #050507;
      color: #ffffff;
      background-image: 
        radial-gradient(circle at center, rgba(255, 140, 0, 0.15) 0%, transparent 60%),
        linear-gradient(rgba(10, 10, 15, 0.95), rgba(10, 10, 15, 0.95)),
        url('https://i.imgur.com/8uQkZ9H.png');
      background-size: 100% 100%, cover, 60px;
      min-height: 100vh;
      padding: 30px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      color: #ffffff;
      margin-bottom: 15px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
    }

    .subtitulo {
      font-size: 22px;
      color: #cccccc;
    }

    .destaque {
      color: #FF8C00;
      font-weight: bold;
    }

    .loja {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 40px;
      padding: 20px;
    }

    .kit {
      background-color: #101018;
      border: 3px solid #33333f;
      border-radius: 15px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .kit:hover {
      border-color: #FF8C00;
      box-shadow: 0 0 40px rgba(255, 140, 0, 0.4);
      transform: translateY(-8px);
    }

    .kit-img {
      width: 100%;
      height: auto;
      display: block;
      border-bottom: 3px solid #444;
    }

    .kit-info {
      padding: 30px;
    }

    .kit-nome {
      font-size: 30px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 15px;
    }

    .kit-preco {
      font-size: 36px;
      font-weight: bold;
      color: #FFD700;
      margin-bottom: 25px;
    }

    .btn-comprar {
      width: 100%;
      background-color: #28a745;
      color: white;
      border: none;
      padding: 22px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-transform: uppercase;
    }

    .btn-comprar:hover {
      background-color: #2ecc71;
      box-shadow: 0 0 30px rgba(40, 167, 69, 0.7);
      transform: scale(1.03);
    }

    .botoes-area {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .btn-discord, .btn-atendente {
      padding: 20px 40px;
      font-size: 22px;
      font-weight: bold;
      border-radius: 10px;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s;
      border: none;
      cursor: pointer;
    }

    .btn-discord {
      background-color: #5865F2;
      color: white;
    }

    .btn-discord:hover {
      background-color: #7289da;
      box-shadow: 0 0 25px rgba(88, 101, 242, 0.6);
    }

    .btn-atendente {
      background-color: #FF8C00;
      color: white;
    }

    .btn-atendente:hover {
      background-color: #FFA500;
      box-shadow: 0 0 25px rgba(255, 140, 0, 0.6);
    }

    .features {
      display: flex;
      justify-content: space-around;
      margin-top: 60px;
      gap: 30px;
      flex-wrap: wrap;
    }

    .feature-card {
      background-color: #101018;
      border: 3px solid #33333f;
      border-radius: 15px;
      padding: 35px;
      text-align: center;
      flex: 1;
      min-width: 300px;
    }

    .feature-icon {
      font-size: 50px;
      color: #FF8C00;
      margin-bottom: 20px;
    }

    .feature-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #ffffff;
    }

    .feature-text {
      color: #b0b0b0;
      font-size: 18px;
    }

    /* ESTILO DA JANELA MODAL (TELA DE PAGAMENTO) */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    .modal-conteudo {
      background-color: #101018;
      border: 3px solid #FF8C00;
      border-radius: 15px;
      padding: 40px;
      width: 90%;
      max-width: 550px;
      text-align: center;
      box-shadow: 0 0 50px rgba(255, 140, 0, 0.5);
      animation: aparecer 0.3s ease;
      position: relative;
    }

    @keyframes aparecer {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    .modal-titulo {
      font-size: 28px;
      color: #FF8C00;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .chave-pix {
      background-color: #1a1a22;
      border: 2px dashed #FF8C00;
      padding: 15px;
      border-radius: 8px;
      font-size: 16px;
      color: #fff;
      margin: 20px 0;
      word-break: break-all;
    }
