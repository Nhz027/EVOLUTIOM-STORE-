<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Evolutium Craft</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    background: #0a0a0c;
    background-image: radial-gradient(circle at 50% 0%, #3d1a00 0%, #0a0a0c 100%);
    color: #fff;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 30px;
}

h1 span { color: #FF8C00; }

.menu-abas {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 40px;
}

.aba {
    padding: 12px 25px;
    background: #16161a;
    border: 1px solid #333;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.aba.ativa {
    border-color: #FF8C00;
    color: #FF8C00;
}

.loja-container {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

.card {
    background: #111114;
    border-radius: 12px;
    padding: 15px;
    border: 1px solid #222;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.banner-img {
    width: 100%;
    border-radius: 8px;
}

.preco {
    font-size: 22px;
    font-weight: bold;
    margin: 10px 0;
}

.btn {
    background: #FF8C00;
    border: none;
    padding: 12px;
    width: 100%;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.btn:hover {
    background: #ff6a00;
}

/* VIP PAGE */
.vip-page {
    display: none;
    max-width: 900px;
    margin: auto;
    text-align: center;
}

.vip-banner {
    width: 250px; /* DIMINUIDO */
    margin: 20px auto;
    border-radius: 10px;
}

.kits-vip img {
    width: 180px; /* AUMENTADO */
    margin: 10px;
    border-radius: 10px;
}

.info-vip {
    text-align: left;
    background: #111;
    padding: 15px;
    border-radius: 10px;
    margin: 20px 0;
    line-height: 1.6;
    font-size: 15px;
}

.pix-box {
    background: #000;
    padding: 15px;
    border: 2px dashed #FF8C00;
    margin: 20px 0;
    font-size: 14px;
}
</style>
</head>

<body>

<h1>EVOLUTIUM <span>CRAFT</span></h1>

<div class="menu-abas">
    <div class="aba ativa" onclick="mostrar('kits')">🐉 KITS</div>
    <div class="aba" onclick="mostrar('vips')">💎 VIPS</div>
</div>

<!-- KITS -->
<div id="kits" class="loja-container" style="display:grid;">

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777948112627-679cbc63-dc9b-449f-9edf-abc0ab5da980.png" class="banner-img">
<div>KIT DBE</div>
<div class="preco">R$ 79,99</div>
<button class="btn">Comprar</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777932013675-f02a1c3f-2dd6-4e65-ae44-e294a0d3531f.png" class="banner-img">
<div>KIT GOD</div>
<div class="preco">R$ 59,99</div>
<button class="btn">Comprar</button>
</div>

<!-- adiciona nos outros igual -->
</div>

<!-- VIPS -->
<div id="vips" class="loja-container">

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777953666424-7d3ea9a0-8973-4020-be51-b8b19e44f1f7.png" class="banner-img">
<div>VIP GOD</div>
<div class="preco">R$ 59,99</div>
<button class="btn" onclick="abrirVip('god')">Ver VIP</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777954537217-c0b6b289-e1b5-4ba1-aad5-e26d39deb871.png" class="banner-img">
<div>VIP ASTRAL</div>
<div class="preco">R$ 59,99</div>
<button class="btn" onclick="abrirVip('astral')">Ver VIP</button>
</div>

</div>

<!-- VIP PAGE -->
<div id="vipPage" class="vip-page">

<h2 id="vipNome"></h2>

<img id="vipImg" class="vip-banner">

<div class="info-vip" id="vipInfo"></div>

<div class="kits-vip" id="vipKits"></div>

<div class="preco">R$ 59,99</div>

<button class="btn" onclick="mostrarPix()">💎 Comprar VIP</button>

<div id="pixArea" style="display:none;">

<div class="pix-box">efc0f5af-cd44-400c-9426-2d071caa7bec</div>

<button class="btn" onclick="copiar()">📋 Copiar chave Pix</button>

<button class="btn" onclick="abrirDiscord()" style="margin-top:10px;">
💬 Abrir Discord
</button>

<p style="margin-top:15px; font-size:14px; line-height:1.6;">
1. Copie a chave Pix<br>
2. Faça o pagamento<br>
3. Abra o Discord<br>
4. Crie um ticket<br>
5. Envie comprovante<br>
6. Aguarde o ADM
</p>

</div>

</div>

<script>
function mostrar(sec){
kits.style.display="none";
vips.style.display="none";
vipPage.style.display="none";
document.getElementById(sec).style.display="grid";
}

function abrirVip(tipo){
kits.style.display="none";
vips.style.display="none";
vipPage.style.display="block";

if(tipo === "god"){
vipNome.innerText = "VIP GOD";
vipImg.src = "https://www.image2url.com/r2/default/images/1777953666424-7d3ea9a0-8973-4020-be51-b8b19e44f1f7.png";

vipInfo.innerHTML = `
+ Vale lendário<br>
+ 10 frutas diárias (30 dias)<br>
+ Tag única<br>
+ 100 pontos de treinamento
`;

vipKits.innerHTML = `
<img src="https://www.image2url.com/r2/default/images/1777932013675-f02a1c3f-2dd6-4e65-ae44-e294a0d3531f.png">
<img src="https://www.image2url.com/r2/default/images/1777936044793-37236af1-a594-4806-8924-5036b2925518.png">
<img src="https://www.image2url.com/r2/default/images/1777948165223-cb6b7142-86d5-4ac3-8241-d79ac6beb846.png">
`;
}

if(tipo === "astral"){
vipNome.innerText = "VIP ASTRAL";
vipImg.src = "https://www.image2url.com/r2/default/images/1777954537217-c0b6b289-e1b5-4ba1-aad5-e26d39deb871.png";

vipInfo.innerHTML = `
+ Vale lendário<br>
+ 300 pontos de treinamento<br>
+ Ultra Ego<br>
+ 15 frutas diárias (30 dias)<br>
+ Tag única<br>
+ Prioridade suporte
`;

vipKits.innerHTML = `
<img src="https://www.image2url.com/r2/default/images/1777948112627-679cbc63-dc9b-449f-9edf-abc0ab5da980.png">
<img src="https://www.image2url.com/r2/default/images/1777936044793-37236af1-a594-4806-8924-5036b2925518.png">
`;
}
}

function mostrarPix(){
pixArea.style.display="block";
}

function copiar(){
navigator.clipboard.writeText("efc0f5af-cd44-400c-9426-2d071caa7bec");
alert("Pix copiado!");
}

function abrirDiscord(){
window.open("https://discord.gg/fPxe5RRec", "_blank");
}
</script>

</body>
</html>
