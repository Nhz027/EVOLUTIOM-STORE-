<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOLUTIOM STORE</title>
    <script>
        function abrirPix() {
            document.getElementById('pixModal').style.display = 'block';
        }
        function fecharPix() {
            document.getElementById('pixModal').style.display = 'none';
        }
        function abrirVip() {
            document.getElementById('vipModal').style.display = 'block';
        }
        function fecharVip() {
            document.getElementById('vipModal').style.display = 'none';
        }
        function trocarAba(tab) {
            let tabs = document.getElementsByClassName('tab');
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].style.display = 'none';
            }
            document.getElementById(tab).style.display = 'block';
        }
    </script>
</head>
<body>
    <h1>Bem-vindo à EVOLUTIOM STORE</h1>
    <button onclick="abrirPix()">Abrir PIX</button>
    <button onclick="abrirVip()">Abrir VIP</button>

    <div id="pixModal" style="display:none;">
        <span onclick="fecharPix()">Fechar</span>
        <p>Conteúdo do modal PIX</p>
    </div>
    <div id="vipModal" style="display:none;">
        <span onclick="fecharVip()">Fechar</span>
        <p>Conteúdo do modal VIP</p>
    </div>

    <div class="tab" id="tab1" style="display:block;">Conteúdo da Aba 1</div>
    <div class="tab" id="tab2" style="display:none;">Conteúdo da Aba 2</div>
    <button onclick="trocarAba('tab1')">Aba 1</button>
    <button onclick="trocarAba('tab2')">Aba 2</button>
</body>
</html>
