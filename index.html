<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Evolutium Craft - Loja</title>

<style>
body {
    background: #2b0f0f;
    font-family: Arial;
    color: white;
    text-align: center;
}

.container {
    margin-top: 50px;
}

.btn {
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    margin: 10px;
}

.kits-btn {
    background: gold;
    color: black;
    font-size: 20px;
}

.card {
    background: #3d1a1a;
    padding: 15px;
    margin: 15px;
    border-radius: 15px;
    display: inline-block;
    width: 200px;
}

.buy {
    background: green;
    color: white;
}

.paid {
    background: orange;
    color: black;
}
</style>
</head>

<body>

<div class="container">

    <!-- BOTÃO PRINCIPAL -->
    <button class="btn kits-btn" onclick="abrirKits()">KITS</button>

    <!-- AREA DOS KITS -->
    <div id="kits" style="display:none;">

        <div class="card">
            <h3>KIT FORTUNA</h3>
            <p>R$ 3,00</p>
            <button class="btn buy">Comprar</button>
            <button class="btn paid" onclick="jaPaguei()">Já paguei</button>
        </div>

        <div class="card">
            <h3>KIT EXPLORADOR</h3>
            <p>R$ 4,50</p>
            <button class="btn buy">Comprar</button>
            <button class="btn paid" onclick="jaPaguei()">Já paguei</button>
        </div>

        <div class="card">
            <h3>KIT GUERREIRO</h3>
            <p>R$ 8,99</p>
            <button class="btn buy">Comprar</button>
            <button class="btn paid" onclick="jaPaguei()">Já paguei</button>
        </div>

    </div>

</div>

<script>

function abrirKits() {
    document.getElementById("kits").style.display = "block";
}

// BOTÃO JÁ PAGUEI (SEM GITHUB)
function jaPaguei() {
    alert("Abra um ticket no Discord e envie o comprovante para receber seu kit.");
}

</script>

</body>
</html>
