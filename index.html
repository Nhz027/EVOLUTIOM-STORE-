<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Evolutium Craft</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    background: #0a0a0c;
    background-image: radial-gradient(circle at 50% 0%, #3d1a00 0%, #0a0a0c 100%);
    color: #fff;
    padding: 20px;
}

h1 { text-align: center; margin-bottom: 30px; font-size: 32px; }
h1 span { color: #FF8C00; }

.menu-abas { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }

.aba {
    padding: 12px 25px;
    background: #16161a;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}
.aba:hover { background:#FF8C00; }

.loja-container {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

/* CARDS */
.card {
    background: #111114;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    transition: 0.2s;
}
.card:hover { transform: scale(1.03); }

.banner-img { width: 100%; border-radius: 10px; }

.preco { font-size: 22px; margin: 10px 0; color: #FF8C00; }

.btn {
    background: linear-gradient(45deg,#FF8C00,#ff5e00);
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    color:#fff;
    font-weight: bold;
}

/* VIP PAGE */
.vip-page {
    display: none;
    max-width: 700px;
    margin: auto;
    text-align: center;
}

/* VIP MENOR */
.vip-banner-detalhe {
    width: 160px;
    margin: 15px auto;
}

/* KITS MAIORES */
.kits-vip-grid {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}
.kits-vip-grid img {
    width: 180px;
    margin: 8px;
    border-radius:10px;
}

/* TEXTO BONITO */
#vip-beneficios {
    text-align:left;
    margin-top:15px;
    line-height:1.8;
    font-size:15px;
}

/* PIX */
.pix-box {
    background: #000;
    padding: 15px;
    border: 2px dashed #FF8C00;
    margin-top: 15px;
    font-size:14px;
}
</style>
</head>

<body>

<h1>EVOLUTIUM <span>CRAFT</span></h1>

<div class="menu-abas">
<div class="aba" onclick="mostrar('kits')">KITS</div>
<div class="aba" onclick="mostrar('vips')">VIPS</div>
</div>

<div id="kits" class="loja-container" style="display:grid;">

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777948112627-679cbc63-dc9b-449f-9edf-abc0ab5da980.png" class="banner-img">
<h3>KIT DBE</h3>
<div class="preco">R$ 79,99</div>
<button class="btn" onclick="abrirCompra('KIT DBE','79,99')">Comprar</button>
</div>

</div>

<div id="vips" class="loja-container">

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777954537217-c0b6b289-e1b5-4ba1-aad5-e26d39deb871.png">
<h3>VIP ASTRAL</h3>
<div class="preco">R$ 59,99</div>
<button class="btn" onclick="verDetalhes('astral')">Ver VIP</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777953666424-7d3ea9a0-8973-4020-be51-b8b19e44f1f7.png">
<h3>VIP GOD</h3>
<div class="preco">R$ 39,99</div>
<button class="btn" onclick="verDetalhes('god')">Ver VIP</button>
</div>

</div>

<div id="vipPage" class="vip-page">

<img id="vip-img" class="vip-banner-detalhe">
<h2 id="vip-nome"></h2>

<div id="vip-kits-container" class="kits-vip-grid"></div>

<ul id="vip-beneficios"></ul>

<div class="preco" id="vip-preco"></div>
<button class="btn" onclick="mostrarPix()">Comprar</button>

<div id="pixArea" style="display:none;">
<div class="pix-box">
Copie a chave PIX abaixo e envie o comprovante no Discord:

<br><br>
<b>efc0f5af-cd44-400c-9426-2d071caa7bec</b>
</div>
<button class="btn" onclick="copiar()">Copiar</button>
</div>

</div>

<script>
const dadosVips = {

astral:{
nome:"VIP ASTRAL",
imagem:"https://www.image2url.com/r2/default/images/1777954537217-c0b6b289-e1b5-4ba1-aad5-e26d39deb871.png",
preco:"59,99",
kits:[
"https://www.image2url.com/r2/default/images/1777201425071-e8de1cf8-926f-47c3-a4a0-00c6bba187b5.png"
],
beneficios:[
"+VALE LENDÁRIO",
"+10 FRUTAS DIÁRIAS (30 DIAS)",
"+TAG ÚNICA",
"+100 PONTOS DE TREINO",
"--- KITS ---",
"KIT GOD",
"KIT COMIDA",
"KIT UPADOR"
]
},

god:{
nome:"VIP LENDÁRIO",
imagem:"https://www.image2url.com/r2/default/images/1777954269240-656474a4-4914-4b5a-94ef-5e78174ac3c9.png",
preco:"39,99",
kits:[
"https://www.image2url.com/r2/default/images/1777948112627-679cbc63-dc9b-449f-9edf-abc0ab5da980.png"
],
beneficios:[
"+VALE LENDÁRIO",
"+300 PONTOS DE TREINO",
"+ULTRA EGO",
"+15 FRUTAS DIÁRIAS (15 DIAS)",
"+TAG ÚNICA",
"+PRIORIDADE NO SUPORTE",
"--- KITS ---",
"KIT DBE",
"KIT COMIDA"
]
}

};

function mostrar(sec){
document.getElementById("kits").style.display="none";
document.getElementById("vips").style.display="none";
document.getElementById("vipPage").style.display="none";

if(sec === "vipPage"){
document.getElementById(sec).style.display="block";
}else{
document.getElementById(sec).style.display="grid";
}
}

function verDetalhes(id){
let v=dadosVips[id];

document.getElementById("vip-nome").innerText=v.nome;
document.getElementById("vip-img").src=v.imagem;
document.getElementById("vip-preco").innerText="R$ "+v.preco;

let kitsContainer=document.getElementById("vip-kits-container");
kitsContainer.innerHTML="";
v.kits.forEach(img=>{
kitsContainer.innerHTML+=`<img src="${img}">`;
});

let lista=document.getElementById("vip-beneficios");
lista.innerHTML="";
v.beneficios.forEach(b=>{
lista.innerHTML+=`<li>${b}</li>`;
});

mostrar("vipPage");
document.getElementById("pixArea").style.display="none";
}

function abrirCompra(nome,preco){
document.getElementById("vip-nome").innerText=nome;
document.getElementById("vip-img").src="";
document.getElementById("vip-preco").innerText="R$ "+preco;
document.getElementById("vip-kits-container").innerHTML="";
document.getElementById("vip-beneficios").innerHTML="<li>Entrega imediata</li>";

mostrar("vipPage");
document.getElementById("pixArea").style.display="none";
}

function mostrarPix(){
document.getElementById("pixArea").style.display="block";
}

function copiar(){
navigator.clipboard.writeText("efc0f5af-cd44-400c-9426-2d071caa7bec");
alert("Pix copiado!");
}
</script>

</body>
</html>
