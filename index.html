<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Evolutium Craft</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
    background: #0a0a0c;
    background-image: radial-gradient(circle at 50% 0%, #3d1a00 0%, #0a0a0c 100%);
    color: #fff;
    padding: 20px;
}

h1 { text-align: center; margin-bottom: 30px; font-size: 28px; text-transform: uppercase; font-family: "Arial Black"; }
h1 span { color: #FF8C00; }

.menu-abas { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }

.aba {
    padding: 12px 25px;
    background: #16161a;
    border: 1px solid #333;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    color: #ccc;
}

.aba.ativa {
    border-color: #FF8C00;
    color: #FF8C00;
}

.loja-container {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

.card {
    background: #111114;
    border-radius: 12px;
    padding: 15px;
    border: 1px solid #222;
}

.banner-img {
    width: 100%;
    border-radius: 8px;
}

.preco { font-size: 22px; font-weight: bold; margin: 10px 0; }

.btn {
    background: #FF8C00;
    border: none;
    padding: 12px;
    width: 100%;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

/* PIX GLOBAL */
.pix-global {
    display: none;
    max-width: 500px;
    margin: 30px auto;
    text-align: center;
}

.pix-box {
    background: #000;
    padding: 15px;
    border: 2px dashed #FF8C00;
    margin: 20px 0;
    font-family: monospace;
    color: #FFDD00;
    word-break: break-all;
}
</style>
</head>

<body>

<h1>EVOLUTIUM <span>CRAFT</span></h1>

<div class="menu-abas">
    <div class="aba ativa" onclick="mostrar('kits')">🐉 KITS</div>
    <div class="aba" onclick="mostrar('vips')">💎 VIPS</div>
</div>

<!-- KITS -->
<div id="kits" class="loja-container" style="display:grid;">

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777948112627-679cbc63-dc9b-449f-9edf-abc0ab5da980.png" class="banner-img">
<div>KIT DBE</div>
<div class="preco">R$ 79,99</div>
<button class="btn" onclick="comprar('KIT DBE')">🛒 Comprar Agora</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777932013675-f02a1c3f-2dd6-4e65-ae44-e294a0d3531f.png" class="banner-img">
<div>KIT GOD</div>
<div class="preco">R$ 59,99</div>
<button class="btn" onclick="comprar('KIT GOD')">🛒 Comprar Agora</button>
</div>

</div>

<!-- VIP -->
<div id="vips" class="loja-container">
<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777205703132-39385d5f-65e0-484b-9d2b-a642f43f3a49.png" class="banner-img">
<div>VIP ASTRAL</div>
<div class="preco">R$ 59,99</div>
<button class="btn" onclick="comprar('VIP ASTRAL')">💎 Comprar VIP</button>
</div>
</div>

<!-- PIX GLOBAL -->
<div id="pixGlobal" class="pix-global">

<h2 id="produtoNome"></h2>

<div class="pix-box">efc0f5af-cd44-400c-9426-2d071caa7bec</div>

<button class="btn" onclick="copiar()">📋 Copiar chave Pix</button>

<button class="btn" onclick="abrirDiscord()" style="margin-top:10px;">
💬 Abrir Discord
</button>

<p style="margin-top:10px; text-align:left;">
1. Copie a chave Pix<br>
2. Faça o pagamento<br>
3. Abra o Discord<br>
4. Abra ticket<br>
5. Envie comprovante<br>
6. Aguarde o ADM
</p>

</div>

<script>
function mostrar(sec){
document.getElementById("kits").style.display="none";
document.getElementById("vips").style.display="none";
document.getElementById("pixGlobal").style.display="none";

document.getElementById(sec).style.display="grid";
}

function comprar(nome){
document.getElementById("kits").style.display="none";
document.getElementById("vips").style.display="none";

document.getElementById("pixGlobal").style.display="block";
document.getElementById("produtoNome").innerText = nome;
}

function copiar(){
navigator.clipboard.writeText("efc0f5af-cd44-400c-9426-2d071caa7bec");
alert("✅ Pix copiado!");
}

function abrirDiscord(){
window.open("https://discord.gg/fPxe5RRec", "_blank");
}
</script>

</body>
</html>
