<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Evolutium Craft</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  color: #fff;
  padding: 20px;
  background: radial-gradient(circle at center, #1a1a2e, #000 80%);
}

/* MENU */
.menu {
  text-align: center;
  margin-bottom: 20px;
}

.menu button {
  background: #FF8C00;
  border: none;
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

/* KITS */
.loja {
  display: none;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 30px;
  max-width: 1400px;
  margin: 0 auto;
}

.kit {
  background: #101018;
  border: 2px solid #333;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}

.kit:hover {
  transform: scale(1.05);
  border-color: #FF8C00;
}

.kit img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.info {
  padding: 20px;
}

h2 {
  font-size: 26px;
}

.preco {
  font-size: 28px;
  color: gold;
  margin: 10px 0;
}

button {
  width: 100%;
  background: #28a745;
  color: white;
  border: none;
  padding: 15px;
  font-size: 18px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 5px;
}

/* MODAL ORIGINAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
}

.caixa {
  background: #101018;
  border: 3px solid #FF8C00;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  max-width: 400px;
  width: 100%;
}

.chave {
  background: #1a1a22;
  border: 2px dashed #FF8C00;
  padding: 15px;
  margin: 20px 0;
  border-radius: 8px;
  word-break: break-all;
}
</style>

</head>

<body>

<h1 style="text-align:center; font-size:40px;">EVOLUTIUM CRAFT</h1>

<div class="menu">
  <button onclick="mostrarKits()">VER KITS</button>
</div>

<div id="kits" class="loja">

  <!-- ORDEM: MENOR PRA MAIOR -->

  <div class="kit">
    <img src="https://kommodo.ai/i/oDLXRZMIQRDwiIMXy7HB">
    <div class="info">
      <h2>KIT FORTUNA</h2>
      <p class="preco">R$ 3,00</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

  <div class="kit">
    <img src="https://s10.aconvert.com/convert/p3r68-cdx67/ab7o9-t5h99.png">
    <div class="info">
      <h2>KIT EXPLORADOR</h2>
      <p class="preco">R$ 4,50</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

  <div class="kit">
    <img src="https://kommodo.ai/i/oXWzhS3335OLgmJWv59C">
    <div class="info">
      <h2>KIT TREINAMENTO</h2>
      <p class="preco">R$ 5,99</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

  <div class="kit">
    <img src="https://kommodo.ai/i/h7SL60xLmTXAEpePP592">
    <div class="info">
      <h2>KIT GUERREIRO</h2>
      <p class="preco">R$ 8,99</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

  <div class="kit">
    <img src="https://kommodo.ai/i/aiF92sYbbLH8or6IurUz">
    <div class="info">
      <h2>KIT DIVINO</h2>
      <p class="preco">R$ 11,99</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

</div>

<!-- MODAL ORIGINAL -->
<div id="modal" class="modal">
  <div class="caixa">
    <span onclick="fechar()" style="float:right;cursor:pointer;font-size:25px;">×</span>
    <h2>💳 PAGAMENTO VIA PIX</h2>
    <div class="chave">efc0f5af-cd44-400c-9426-2d071caa7bec</div>
    <button onclick="copiar()">COPIAR</button>
    <button onclick="pago()">JÁ PAGUEI</button>
  </div>
</div>

<script>
function mostrarKits() {
  document.getElementById('kits').style.display = "grid";
}

function abrir() {
  document.getElementById('modal').style.display = "flex";
}

function fechar() {
  document.getElementById('modal').style.display = "none";
}

function copiar() {
  navigator.clipboard.writeText("efc0f5af-cd44-400c-9426-2d071caa7bec");
  alert("Chave copiada!");
}

function pago() {
  alert("Envie o comprovante no Discord!");
}
</script>

</body>
</html>
