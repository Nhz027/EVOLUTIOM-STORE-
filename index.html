<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Evolutium Craft</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
    background: #0a0a0c;
    background-image: radial-gradient(circle at 50% 0%, #3d1a00 0%, #0a0a0c 100%);
    background-attachment: fixed;
    color: #fff;
    padding: 20px;
}

h1 { text-align: center; margin-bottom: 30px; font-size: 28px; text-transform: uppercase; font-family: "Arial Black"; letter-spacing: 2px; }
h1 span { color: #FF8C00; }

.menu-abas { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }

.aba {
    padding: 12px 25px; background: #16161a; border: 1px solid #333;
    border-radius: 8px; cursor: pointer; font-weight: bold; color: #ccc;
}

.aba.ativa {
    border-color: #FF8C00; color: #FF8C00;
    background: #1f1f23;
}

.loja-container {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
}

.card {
    background: #111114;
    border-radius: 12px;
    padding: 15px;
    border: 1px solid #222;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
    border-color: #FF8C00;
}

.banner-img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 15px;
}

.titulo-item { font-size: 14px; color: #aaa; text-transform: uppercase; }
.preco { font-size: 22px; font-weight: bold; }
.pix-tag { font-size: 11px; color: #666; }

.btn-comprar {
    margin-top: 10px;
    padding: 12px;
    background: #FF8C00;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

.modal-corpo {
    background: #111;
    max-width: 600px;
    margin: 50px auto;
    padding: 30px;
    border: 2px solid #FF8C00;
    border-radius: 12px;
    text-align: center;
}

.fechar {
    float: right;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>EVOLUTIUM <span>CRAFT</span></h1>

<div class="menu-abas">
    <div class="aba ativa" id="abaKitsBtn" onclick="trocarAba('kits')">🐉 KITS</div>
    <div class="aba" id="abaVipsBtn" onclick="trocarAba('vips')">💎 VIPS</div>
</div>

<!-- KITS -->
<div id="containerKits" class="loja-container" style="display:grid;">

<div class="card" onclick="abrirPix()">
<img src="https://www.image2url.com/r2/default/images/1777201320061-f0615e0e-4b2d-49b9-9284-82686cee7615.png" class="banner-img">
<div class="titulo-item">KIT EXPLORADOR</div>
<div class="preco">R$ 5,99</div>
<button class="btn-comprar">Comprar</button>
</div>

<div class="card" onclick="abrirPix()">
<img src="https://www.image2url.com/r2/default/images/1777201168083-19e6d47b-7d51-4784-b0b3-09a71c59a0b0.png" class="banner-img">
<div class="titulo-item">KIT FORTUNA</div>
<div class="preco">R$ 7,99</div>
<button class="btn-comprar">Comprar</button>
</div>

<div class="card" onclick="abrirPix()">
<img src="https://www.image2url.com/r2/default/images/1777201524372-66df4ab0-3915-46bd-8a8b-fd49979f5464.png" class="banner-img">
<div class="titulo-item">KIT TREINAMENTO</div>
<div class="preco">R$ 7,99</div>
<button class="btn-comprar">Comprar</button>
</div>

<div class="card" onclick="abrirPix()">
<img src="https://www.image2url.com/r2/default/images/1777201368066-3dfd02a5-ee97-4a14-b480-343326c2cbd3.png" class="banner-img">
<div class="titulo-item">KIT GUERREIRO</div>
<div class="preco">R$ 14,99</div>
<button class="btn-comprar">Comprar</button>
</div>

<div class="card" onclick="abrirPix()">
<img src="https://www.image2url.com/r2/default/images/1777948165223-cb6b7142-86d5-4ac3-8241-d79ac6beb846.png" class="banner-img">
<div class="titulo-item">KIT UPADOR</div>
<div class="preco">R$ 16,99</div>
<button class="btn-comprar">Comprar</button>
</div>

<div class="card" onclick="abrirPix()">
<img src="https://www.image2url.com/r2/default/images/1777936044793-37236af1-a594-4806-8924-5036b2925518.png" class="banner-img">
<div class="titulo-item">KIT COMIDA</div>
<div class="preco">R$ 16,99</div>
<button class="btn-comprar">Comprar</button>
</div>

<div class="card" onclick="abrirPix()">
<img src="https://www.image2url.com/r2/default/images/1777201425071-e8de1cf8-926f-47c3-a4a0-00c6bba187b5.png" class="banner-img">
<div class="titulo-item">KIT DIVINO</div>
<div class="preco">R$ 19,99</div>
<button class="btn-comprar">Comprar</button>
</div>

<div class="card" onclick="abrirPix()">
<img src="https://www.image2url.com/r2/default/images/1777932013675-f02a1c3f-2dd6-4e65-ae44-e294a0d3531f.png" class="banner-img">
<div class="titulo-item">KIT GOD</div>
<div class="preco">R$ 59,99</div>
<button class="btn-comprar">Comprar</button>
</div>

<div class="card" onclick="abrirPix()">
<img src="https://www.image2url.com/r2/default/images/1777948112627-679cbc63-dc9b-449f-9edf-abc0ab5da980.png" class="banner-img">
<div class="titulo-item">KIT DBE</div>
<div class="preco">R$ 79,99</div>
<button class="btn-comprar">Comprar</button>
</div>

</div>

<!-- VIP -->
<div id="containerVips" class="loja-container">
<div class="card" onclick="abrirVip()">
<img src="https://www.image2url.com/r2/default/images/1777205703132-39385d5f-65e0-484b-9d2b-a642f43f3a49.png" class="banner-img">
<div class="titulo-item">VIP ASTRAL</div>
<div class="preco">R$ 59,99</div>
<button class="btn-comprar">Ver</button>
</div>
</div>

<!-- MODAL -->
<div id="modalVip" class="modal">
<div class="modal-corpo">
<span class="fechar" onclick="fecharVip()">×</span>

<h2>VIP ASTRAL</h2>
<p>Benefícios exclusivos no servidor</p>

<div class="preco">R$ 59,99</div>

<button class="btn-comprar">Comprar via Pix</button>

</div>
</div>

<script>
function trocarAba(aba){
document.getElementById("containerKits").style.display = aba=="kits"?"grid":"none";
document.getElementById("containerVips").style.display = aba=="vips"?"grid":"none";

document.getElementById("abaKitsBtn").classList.toggle("ativa",aba=="kits");
document.getElementById("abaVipsBtn").classList.toggle("ativa",aba=="vips");
}

function abrirVip(){
document.getElementById("modalVip").style.display="block";
}

function fecharVip(){
document.getElementById("modalVip").style.display="none";
}

function abrirPix(){
alert("Pague via Pix e envie o comprovante no Discord!");
}

window.onclick=function(e){
if(e.target==document.getElementById("modalVip")){
fecharVip();
}
}
</script>

</body>
</html>
