<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Evolutium Craft</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  color: #fff;
  padding: 20px;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f0f 70%);
}

h1 {
  text-align: center;
  font-size: 42px;
  margin: 20px 0;
}

h1 span {
  color: #FF8C00;
}

.loja {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 30px;
  max-width: 1400px;
  margin: 0 auto;
}

.kit {
  background: #111;
  border: 2px solid #333;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}

.kit:hover {
  transform: scale(1.05);
  border-color: #FF8C00;
}

.kit img {
  width: 100%;
  height: 260px;
  object-fit: cover;
}

.info {
  padding: 20px;
}

h2 {
  font-size: 26px;
}

.preco {
  font-size: 30px;
  color: gold;
  margin: 10px 0;
}

button {
  width: 100%;
  background: linear-gradient(45deg, #ff9900, #ff6600);
  border: none;
  padding: 15px;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
}

.caixa {
  background: #111;
  border: 2px solid #FF8C00;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  max-width: 400px;
  width: 100%;
}

.chave {
  background: #1a1a22;
  padding: 10px;
  margin: 15px 0;
  border-radius: 8px;
  word-break: break-all;
}

</style>
</head>

<body>

<h1>LOJA <span>EVOLUTIUM CRAFT</span></h1>

<div class="loja">

  <div class="kit">
    <img src="https://s10.aconvert.com/convert/p3r68-cdx67/ak82a-t87rp.png">
    <div class="info">
      <h2>KIT FORTUNA</h2>
      <p class="preco">R$3,00</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

  <div class="kit">
    <img src="https://s10.aconvert.com/convert/p3r68-cdx67/ab7o9-t5h99.png">
    <div class="info">
      <h2>KIT EXPLORADOR</h2>
      <p class="preco">R$5,00</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

  <div class="kit">
    <img src="https://s10.aconvert.com/convert/p3r68-cdx67/a2rjy-kopni.png">
    <div class="info">
      <h2>KIT GUERREIRO</h2>
      <p class="preco">R$10,00</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

  <div class="kit">
    <img src="https://s10.aconvert.com/convert/p3r68-cdx67/ah8br-f2btc.png">
    <div class="info">
      <h2>KIT TREINAMENTO</h2>
      <p class="preco">R$7,00</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

  <div class="kit">
    <img src="https://s10.aconvert.com/convert/p3r68-cdx67/anfjf-r7ewu.png">
    <div class="info">
      <h2>KIT DIVINO</h2>
      <p class="preco">R$15,00</p>
      <button onclick="abrir()">COMPRAR</button>
    </div>
  </div>

</div>

<div id="modal" class="modal">
  <div class="caixa">
    <h2>PAGAMENTO PIX</h2>
    <p>Copie a chave:</p>
    <div class="chave">efc0f5af-cd44-400c-9426-2d071caa7bec</div>
    <button onclick="fechar()">FECHAR</button>
  </div>
</div>

<script>
function abrir() {
  document.getElementById('modal').style.display = "flex";
}
function fechar() {
  document.getElementById('modal').style.display = "none";
}
</script>

</body>
</html>
