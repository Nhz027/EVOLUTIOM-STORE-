<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Loja do Servidor</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    .kit {
      background: #1e293b;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }
    button {
      background: green;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>🛒 Loja do Servidor</h1>

  <div class="kit">
    <h2>Kit Iniciante</h2>
    <p>Itens básicos pra começar</p>
    <p>R$ 5,00</p>
    <button onclick="comprar()">Comprar</button>
  </div>

  <div class="kit">
    <h2>Kit VIP</h2>
    <p>Itens fortes e raros</p>
    <p>R$ 15,00</p>
    <button onclick="comprar()">Comprar</button>
  </div>

  <script>
    function comprar() {
      alert("Chama no Discord para comprar!");
    }
  </script>

</body>
</html>
