<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Evolutium Craft</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
    background: #0a0a0c;
    background-image: radial-gradient(circle at 50% 0%, #3d1a00 0%, #0a0a0c 100%);
    color: #fff;
    padding: 20px;
}

h1 { text-align: center; margin-bottom: 30px; font-size: 32px; }
h1 span { color: #FF8C00; }

.menu-abas { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; }

.aba {
    padding: 14px 30px;
    background: #16161a;
    border-radius: 10px;
    cursor: pointer;
}

.loja-container {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.card {
    background: #111114;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
}

.banner-img { width: 100%; border-radius: 10px; }

.preco { font-size: 22px; margin: 10px 0; color: #FF8C00; }

.btn {
    background: #FF8C00;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
}

/* VIP */
.vip-page { display: none; text-align: center; }

.vip-banner-detalhe {
    width: 250px;
    margin: 10px auto;
}

.kits-vip-grid img {
    width: 170px;
    margin: 10px;
}

.pix-box {
    background: #000;
    padding: 15px;
    border: 2px dashed orange;
}
</style>
</head>

<body>

<h1>EVOLUTIUM <span>CRAFT</span></h1>

<div class="menu-abas">
<div class="aba" onclick="mostrar('kits')">KITS</div>
<div class="aba" onclick="mostrar('vips')">VIPS</div>
</div>

<!-- KITS -->
<div id="kits" class="loja-container" style="display:grid;">

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777948112627-679cbc63-dc9b-449f-9edf-abc0ab5da980.png" class="banner-img">
<h3>KIT DBE</h3>
<div class="preco">R$ 79,99</div>
<button class="btn" onclick="abrirCompra('KIT DBE','79,99')">Comprar</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777932013675-f02a1c3f-2dd6-4e65-ae44-e294a0d3531f.png" class="banner-img">
<h3>KIT GOD</h3>
<div class="preco">R$ 59,99</div>
<button class="btn" onclick="abrirCompra('KIT GOD','59,99')">Comprar</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777201425071-e8de1cf8-926f-47c3-a4a0-00c6bba187b5.png" class="banner-img">
<h3>KIT DIVINO</h3>
<div class="preco">R$ 19,99</div>
<button class="btn" onclick="abrirCompra('KIT DIVINO','19,99')">Comprar</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777948165223-cb6b7142-86d5-4ac3-8241-d79ac6beb846.png" class="banner-img">
<h3>KIT UPADOR</h3>
<div class="preco">R$ 16,99</div>
<button class="btn" onclick="abrirCompra('KIT UPADOR','16,99')">Comprar</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777936044793-37236af1-a594-4806-8924-5036b2925518.png" class="banner-img">
<h3>KIT COMIDA</h3>
<div class="preco">R$ 16,99</div>
<button class="btn" onclick="abrirCompra('KIT COMIDA','16,99')">Comprar</button>
</div>

</div>

<!-- VIPS -->
<div id="vips" class="loja-container">

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777954537217-c0b6b289-e1b5-4ba1-aad5-e26d39deb871.png">
<h3>VIP ASTRAL</h3>
<div class="preco">R$ 59,99</div>
<button class="btn" onclick="verDetalhes('astral')">Ver VIP</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777953666424-7d3ea9a0-8973-4020-be51-b8b19e44f1f7.png">
<h3>VIP GOD</h3>
<div class="preco">R$ 39,99</div>
<button class="btn" onclick="verDetalhes('god')">Ver VIP</button>
</div>

<div class="card">
<img src="https://www.image2url.com/r2/default/images/1777954269240-656474a4-4914-4b5a-94ef-5e78174ac3c9.png">
<h3>VIP LENDÁRIO</h3>
<div class="preco">R$ 99,99</div>
<button class="btn" onclick="verDetalhes('lendario')">Ver VIP</button>
</div>

</div>

<!-- VIP PAGE -->
<div id="vipPage" class="vip-page">

<img id="vip-img" class="vip-banner-detalhe">
<h2 id="vip-nome"></h2>

<div id="vip-kits-container" class="kits-vip-grid"></div>

<ul id="vip-beneficios"></ul>

<div class="preco" id="vip-preco"></div>
<button class="btn" onclick="mostrarPix()">Comprar</button>

<div id="pixArea" style="display:none;">
<div class="pix-box">efc0f5af-cd44-400c-9426-2d071caa7bec</div>
<button class="btn" onclick="copiar()">Copiar</button>
</div>

</div>

<script>
const dadosVips = {
astral:{
nome:"VIP ASTRAL",
imagem:"https://www.image2url.com/r2/default/images/1777954537217-c0b6b289-e1b5-4ba1-aad5-e26d39deb871.png",
preco:"59,99",
kits:[
"https://www.image2url.com/r2/default/images/1777948112627-679cbc63-dc9b-449f-9edf-abc0ab5da980.png",
"https://www.image2url.com/r2/default/images/1777936044793-37236af1-a594-4806-8924-5036b2925518.png"
],
beneficios:["Frutas diárias 30 dias","Tag única"]
},

god:{
nome:"VIP GOD",
imagem:"https://www.image2url.com/r2/default/images/1777953666424-7d3ea9a0-8973-4020-be51-b8b19e44f1f7.png",
preco:"39,99",
kits:[
"https://www.image2url.com/r2/default/images/1777932013675-f02a1c3f-2dd6-4e65-ae44-e294a0d3531f.png",
"https://www.image2url.com/r2/default/images/1777936044793-37236af1-a594-4806-8924-5036b2925518.png"
],
beneficios:["Frutas diárias","100 treino"]
}
};

function mostrar(sec){
kits.style.display="none";
vips.style.display="none";
vipPage.style.display="none";
document.getElementById(sec).style.display="grid";
}

function verDetalhes(id){
let v=dadosVips[id];
vipNome.innerText=v.nome;
vipImg.src=v.imagem;
vipPreco.innerText="R$ "+v.preco;

vipKitsContainer.innerHTML="";
v.kits.forEach(i=>{
vipKitsContainer.innerHTML+=`<img src="${i}">`;
});

vipBeneficios.innerHTML="";
v.beneficios.forEach(b=>{
vipBeneficios.innerHTML+=`<li>${b}</li>`;
});

mostrar("vipPage");
pixArea.style.display="none";
}

function abrirCompra(nome,preco){
vipNome.innerText=nome;
vipImg.src="";
vipPreco.innerText="R$ "+preco;
mostrar("vipPage");
pixArea.style.display="none";
}

function mostrarPix(){pixArea.style.display="block";}
function copiar(){navigator.clipboard.writeText("efc0f5af-cd44-400c-9426-2d071caa7bec");alert("Copiado");}
</script>

</body>
</html>
